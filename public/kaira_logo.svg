<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe27c" />
      <stop offset="30%" stop-color="#fbbf24" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="250" cy="250" r="240" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="6" />

  <!-- Inner Gold Ring -->
  <circle cx="250" cy="250" r="225" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="8, 6" opacity="0.6" />

  <!-- Sparkles/Stars -->
  <g fill="url(#goldGrad)">
    <circle cx="120" cy="140" r="3" opacity="0.8" />
    <circle cx="380" cy="130" r="4" opacity="0.9" />
    <circle cx="410" cy="280" r="2" opacity="0.6" />
    <circle cx="90" cy="310" r="3" opacity="0.7" />
    <polygon points="380,105 383,111 389,112 384,116 386,122 380,119 374,122 376,116 371,112 377,111" opacity="0.7" />
  </g>

  <!-- Golden Letter "K" -->
  <path d="M 180,130 
           L 225,130 
           L 225,215 
           L 300,130 
           L 360,130 
           L 275,225 
           L 370,350 
           L 305,350 
           L 225,245 
           L 225,350 
           L 180,350 
           Z" 
        fill="url(#goldGrad)" 
        filter="drop-shadow(0px 8px 16px rgba(0,0,0,0.5))" />

  <!-- Rupee Symbol '₹' on top-right -->
  <g transform="translate(370, 160) scale(1.3)" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.3))">
    <path d="M 0,0 L 15,0 M 0,6 L 12,6 M 0,0 C 8,0 12,2 12,6 C 12,10 8,12 0,12 L 0,6 M 0,12 L 12,22" 
          fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Chart/Graph bars at the bottom left -->
  <g transform="translate(130, 270)" fill="url(#goldGrad)">
    <!-- Bar 1 -->
    <rect x="0" y="50" width="8" height="30" rx="3" />
    <circle cx="4" cy="46" r="3" fill="#ffe27c" />
    <!-- Bar 2 -->
    <rect x="14" y="30" width="8" height="50" rx="3" />
    <circle cx="18" cy="26" r="3" fill="#ffe27c" />
    <!-- Bar 3 -->
    <rect x="28" y="10" width="8" height="70" rx="3" />
    <circle cx="32" cy="6" r="3" fill="#ffe27c" />
    <!-- Upward Trend Arrow -->
    <path d="M -4,55 L 12,32 L 26,12 L 34,2 M 34,2 L 26,2 M 34,2 L 34,10" 
          fill="none" stroke="#ffe27c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Text: "Kaira Billing" -->
  <text x="250" y="420" 
        font-family="'Outfit', 'Plus Jakarta Sans', 'Inter', sans-serif" 
        font-size="34" 
        font-weight="800" 
        letter-spacing="2" 
        fill="url(#goldGrad)" 
        text-anchor="middle"
        filter="drop-shadow(0px 4px 8px rgba(0,0,0,0.4))">
    Kaira Billing
  </text>
</svg>
